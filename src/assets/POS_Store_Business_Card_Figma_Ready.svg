
<svg width="1050" height="600" viewBox="0 0 1050 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1E2D"/>
      <stop offset="100%" stop-color="#1E6FB8"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F3D66"/>
      <stop offset="100%" stop-color="#2FA4FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1050" height="600" rx="28" fill="url(#bgGrad)"/>

  <!-- Decorative Wave -->
  <path d="M600 0 C780 120, 900 240, 1050 260 L1050 600 L600 600 Z" fill="url(#waveGrad)" opacity="0.9"/>

  <!-- Left Content -->
  <g transform="translate(60,80)" fill="#FFFFFF">
    <!-- Icon -->
    <rect x="0" y="0" width="120" height="80" rx="10" fill="#2FA4FF"/>
    <rect x="15" y="15" width="90" height="50" rx="6" fill="#0B1E2D"/>
    <rect x="20" y="55" width="80" height="10" fill="#FFFFFF"/>

    <!-- Title -->
    <text x="0" y="140" font-size="44" font-weight="700" font-family="Inter, Arial">
      POS &amp; STORE
    </text>
    <text x="0" y="190" font-size="36" font-weight="600" font-family="Inter, Arial" fill="#A8D8FF">
      MANAGEMENT SYSTEM
    </text>

    <!-- Features -->
    <text x="0" y="260" font-size="24" font-family="Inter, Arial">✔ Sales &amp; Inventory Tracking</text>
    <text x="0" y="310" font-size="24" font-family="Inter, Arial">✔ Customer Management</text>
    <text x="0" y="360" font-size="24" font-family="Inter, Arial">✔ Reports &amp; Analytics</text>
    <text x="0" y="410" font-size="24" font-family="Inter, Arial">✔ Easy Integration</text>
  </g>

  <!-- QR Placeholder -->
  <g transform="translate(700,140)">
    <rect x="0" y="0" width="260" height="260" rx="16" fill="#FFFFFF"/>
    <rect x="20" y="20" width="220" height="220" fill="#000000"/>
    <text x="130" y="300" text-anchor="middle" font-size="22" font-family="Inter, Arial" fill="#FFFFFF">
      Scan to Access System
    </text>
  </g>
</svg>
